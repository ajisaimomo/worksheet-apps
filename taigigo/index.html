<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>対義語プリント</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #e8e2d8;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px; gap: 14px;
  }

  /* ── UIパネル ── */
  .ui-panel {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; align-items: center;
    background: #fff; border-radius: 14px;
    padding: 12px 20px;
    box-shadow: 0 2px 10px rgba(0,0,0,.1);
    max-width: 800px;
  }
  .ui-panel label { font-size: 13px; font-weight: 700; color: #555; }
  .tab-group { display: flex; gap: 4px; }
  .tab {
    font-family: 'Noto Sans JP', sans-serif; font-size: 13px;
    padding: 7px 14px; border: 2px solid #c0b89a; border-radius: 7px;
    cursor: pointer; background: #f5f0e8; color: #555; font-weight: 700;
    transition: all 0.15s;
  }
  .tab.active { background: #7a5c2e; color: #fff; border-color: #7a5c2e; }
  .tab:hover:not(.active) { background: #ede8da; }
  .divider { width: 1px; background: #ddd; height: 30px; margin: 0 4px; }

  button {
    font-family: 'Noto Sans JP', sans-serif; font-size: 13px;
    padding: 8px 14px; border: 2px solid #333; border-radius: 8px;
    cursor: pointer; background: #333; color: #fff; font-weight: 700;
    transition: background 0.15s; white-space: nowrap;
  }
  button:hover { background: #555; }
  button.sec { background: #fff; color: #333; }
  button.sec:hover { background: #eee; }
  button:disabled { opacity: 0.35; cursor: default; }
  button.active-btn { background: #4a6fa5; color: #fff; border-color: #4a6fa5; }

  .nav-row { display: flex; gap: 6px; align-items: center; }
  .nav-row span { font-size: 12px; font-weight: 700; color: #666; min-width: 80px; text-align: center; }

  /* ── A4シート ── */
  .sheet {
    width: 210mm; height: 297mm;
    background: #fff;
    padding: 10mm 13mm 8mm;
    box-shadow: 0 4px 24px rgba(0,0,0,.18);
    border: 1px solid #bbb;
    display: flex; flex-direction: column; overflow: hidden;
  }

  /* ── ヘッダー ── */
  .header {
    display: flex; justify-content: space-between; align-items: flex-end;
    border-bottom: 3px solid #333; padding-bottom: 7px; margin-bottom: 8px;
    flex-shrink: 0;
  }
  .header h1 {
    font-family: 'Noto Serif JP', serif; font-size: 20px;
    font-weight: 700; letter-spacing: .08em;
  }
  .badge {
    display: inline-block; background: #7a5c2e; color: #fff;
    font-size: 11px; font-weight: 700; padding: 2px 8px;
    border-radius: 5px; margin-left: 8px;
  }
  .header .sub { font-size: 10px; color: #999; margin-top: 3px; }
  .header-right { display: flex; gap: 14px; font-size: 12px; align-items: center; flex-shrink: 0; }
  .field { display: flex; align-items: center; gap: 5px; }
  .uline { border-bottom: 1.5px solid #333; height: 18px; }

  /* ── 指示文 ── */
  .instruction {
    background: #fffbec; border-left: 5px solid #e8b400;
    padding: 7px 13px; font-size: 13px; font-weight: 700;
    color: #444; margin-bottom: 10px;
    border-radius: 0 6px 6px 0; flex-shrink: 0;
  }

  /* ══ 書き込み式 ══ */
  .fill-grid {
    flex: 1; display: flex; flex-direction: column; justify-content: space-around;
  }
  /* 全語が20以下のとき：2列レイアウト */
  .fill-grid-2col {
    flex: 1; display: grid;
    grid-template-columns: 1fr 1fr;
    column-gap: 14px;
    align-content: space-around;
  }
  .fill-grid-2col .fill-row {
    grid-template-columns: 36px 76px 24px 76px;
    gap: 4px;
  }
  .fill-grid-2col .fill-word { font-size: 18px; padding: 4px 3px; }
  .fill-grid-2col .fill-blank { height: 34px; }
  .fill-grid-2col .fill-blank .ans { font-size: 16px; }
  .fill-grid-2col .fill-arrow { font-size: 14px; }
  .fill-grid-2col .fill-num { font-size: 11px; }

  .fill-row {
    display: grid;
    grid-template-columns: 44px 86px 30px 86px 1fr;
    align-items: center; gap: 6px;
  }
  .fill-num { font-size: 12px; font-weight: 700; color: #aaa; text-align: right; }
  .fill-word {
    background: #fdf0e8; border: 2.5px solid #c87941; border-radius: 9px;
    font-family: 'Noto Serif JP', serif; font-size: 20px; font-weight: 700;
    text-align: center; padding: 5px 4px; color: #1a1a1a; line-height: 1.1;
  }
  .fill-arrow { text-align: center; font-size: 16px; color: #bbb; font-weight: 700; }
  .fill-blank {
    border-bottom: 2.5px solid #333; height: 38px; position: relative;
  }
  .fill-blank .ans {
    display: none; position: absolute;
    bottom: 2px; left: 0; right: 0; text-align: center;
    font-family: 'Noto Serif JP', serif; font-size: 18px; font-weight: 700;
    color: #c00;
  }
  .show-ans .fill-blank .ans { display: block; }

  /* ══ 線つなぎ 共通 ══ */
  .match-area {
    flex: 1; position: relative; display: flex; min-height: 0; overflow: hidden;
  }
  .left-col {
    display: flex; flex-direction: column; justify-content: space-around;
    flex-shrink: 0; z-index: 1;
  }
  .right-col {
    display: flex; flex-direction: column; justify-content: space-around;
    flex-shrink: 0; z-index: 1; margin-left: auto;
  }
  /* 対義語つなぎ */
  .match-word .left-col  { width: 110px; padding-right: 14px; }
  .match-word .right-col { width: 110px; padding-left: 14px; }
  /* 意味つなぎ */
  .match-meaning .left-col  { width: 100px; padding-right: 14px; }
  .match-meaning .right-col { width: 238px; padding-left: 14px; }

  .match-svg {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 0; overflow: visible;
  }
  .left-item  { display: flex; align-items: center; justify-content: flex-end; position: relative; }
  .right-item { display: flex; align-items: center; position: relative; }

  .word-box {
    font-family: 'Noto Serif JP', serif; font-size: 20px; font-weight: 700;
    text-align: center; padding: 5px 8px; border-radius: 9px;
    color: #1a1a1a; min-width: 72px; line-height: 1.1;
  }
  .word-box.lb { background: #fdf0e8; border: 2.5px solid #c87941; }
  .word-box.rb { background: #f0f4ff; border: 2px solid #5c7fb8; }

  .meaning-box {
    background: #f0f4ff; border: 2px solid #5c7fb8; border-radius: 9px;
    padding: 6px 10px; font-size: 12px; line-height: 1.5;
    color: #1a1a1a; width: 100%;
  }

  /* ドット */
  .left-item::after {
    content: ''; position: absolute; right: -7px; top: 50%;
    transform: translateY(-50%);
    width: 13px; height: 13px; background: #c87941;
    border-radius: 50%; border: 2px solid #fff;
    box-shadow: 0 0 0 1.5px #c87941; z-index: 3;
  }
  .right-item::before {
    content: ''; position: absolute; left: -7px; top: 50%;
    transform: translateY(-50%);
    width: 13px; height: 13px; background: #5c7fb8;
    border-radius: 50%; border: 2px solid #fff;
    box-shadow: 0 0 0 1.5px #5c7fb8; z-index: 3;
  }
  .ans-line {
    stroke: #2e7d32; stroke-width: 2.5; stroke-linecap: round;
    opacity: 0; transition: opacity 0.3s;
  }
  .show-ans .ans-line { opacity: 1; }

  /* ── フッター ── */
  .footer {
    border-top: 1px solid #eee; padding-top: 5px; margin-top: 5px;
    text-align: center; font-size: 9px; color: #ccc; flex-shrink: 0;
  }

  /* ── 苦手選択パネル ── */
  #nigatePanel {
    width: 210mm;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,.18);
    border: 1px solid #bbb;
    padding: 20px 24px 16px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .nigate-level-block { margin-bottom: 8px; }
  .nigate-level-title {
    font-size: 13px; font-weight: 700; color: #7a5c2e;
    border-bottom: 2px solid #c87941;
    padding-bottom: 4px; margin-bottom: 10px;
  }
  .nigate-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px 10px;
  }
  .nigate-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 13px; cursor: pointer;
    padding: 4px 6px; border-radius: 6px;
    transition: background 0.12s;
  }
  .nigate-item:hover { background: #fdf0e8; }
  .nigate-item input[type="checkbox"] { accent-color: #c87941; width: 15px; height: 15px; cursor: pointer; }
  .nigate-item label { cursor: pointer; line-height: 1.3; }
  .nigate-action {
    display: flex; align-items: center; gap: 10px;
    border-top: 1px solid #eee; padding-top: 14px;
    flex-wrap: wrap;
  }
  .nigate-count-label { font-size: 13px; color: #888; font-weight: 700; margin-left: 4px; }

  /* ── 印刷 ── */
  @media print {
    body { background: #fff; padding: 0; gap: 0; }
    .ui-panel { display: none !important; }
    #nigatePanel { display: none !important; }
    .sheet {
      width: 100%; height: 297mm;
      box-shadow: none; border: none;
      padding: 10mm 13mm 8mm;
    }
    .fill-blank .ans { display: none !important; }
    .ans-line { opacity: 0 !important; }
    @page { size: A4; margin: 0; }
  }
</style>
</head>
<body>

<div class="ui-panel">
  <!-- レベル -->
  <label>レベル：</label>
  <div class="tab-group" id="levelTabs">
    <div class="tab active" data-level="基本">基本</div>
    <div class="tab" data-level="A">Aランク</div>
    <div class="tab" data-level="B">Bランク</div>
    <div class="tab" data-level="C">Cランク</div>

  </div>

    <div class="tab" data-type="match-meaning">📖 意味つなぎ</div>
  </div>
  <div class="divider"></div>

  <div id="fillControls" class="nav-row">

  </div>

  <div id="pageControls" class="nav-row">

    <button class="sec" id="btnNext">▶</button>
  </div>
  <!-- 意味つなぎ：1枚目/2枚目は◀▶で操作するため非表示 -->
  <div id="meaningControls" class="nav-row" style="display:none">

    <button class="sec" id="btnMeanPage1">2枚目（右の言葉）</button>
  </div>
  <div class="divider"></div>
  <button class="sec" id="btnBackToNigate" style="display:none">◀ 選択に戻る</button>
  <button id="btnAns">✔ 答えを見る</button>
  <button class="sec" id="btnHide">✕ 隠す</button>
  <button class="sec" onclick="window.print()">🖨 印刷</button>
</div>

<div class="sheet" id="sheet"></div>

<!-- 苦手選択パネル -->
<div id="nigatePanel" style="display:none;">
  <div id="nigatePanelInner"></div>
  <div class="nigate-action">
    <button id="btnNigateCreate" disabled>✏️ 書き込み式プリントを作る</button>
    <button class="sec" id="btnNigateClear">☆ チェックをすべて外す</button>
    <span id="nigateCount" class="nigate-count-label">0件選択中</span>
  </div>
</div>

/* ══════════════════════
   定数・状態
══════════════════════ */
const CHUNK = 12;
const LEVEL_LABEL = {'基本':'基本レベル','A':'Aランク','B':'Bランク','C':'Cランク'};

let currentLevel  = '基本';
let currentType   = 'fill';
let showAns       = false;

// 書き込み式
let fillFlipped     = false;  // false=通常, true=逆転
let fillGroupIdx    = 0;
let fillBlankRight  = new Set(); // 空欄パターン（右が空欄のインデックス集合）

// 対義語つなぎ
let wordGroupIdx  = 0;
let wordOrder     = [];

// 意味つなぎ
let meanGroupIdx  = 0;
let meanPage      = 0; // 0=左の語, 1=右の語
let meanOrder     = [];

/* ── ユーティリティ ── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// 空欄パターンをレベル・グループ変更時のみ生成する
function generateFillPattern() {
  const allTotal = DATA[currentLevel].length;
  const use2col  = allTotal <= 20;
  const total    = use2col ? allTotal : Math.min(CHUNK, allTotal - fillGroupIdx * CHUNK);
  fillBlankRight = new Set(
    shuffle([...Array(total).keys()]).slice(0, Math.ceil(total / 2))
  );
}
function numGroups(level) {
  return Math.ceil(DATA[level].length / CHUNK);
}
function getChunk(level, idx) {
  return DATA[level].slice(idx * CHUNK, (idx+1) * CHUNK);
}

/* ── SVG線描画 ── */
function drawLines() {
  const svg  = document.getElementById('matchSvg');
  const area = document.getElementById('matchArea');
  if (!svg || !area) return;
  svg.innerHTML = '';
  const ar = area.getBoundingClientRect();
  svg.setAttribute('width', ar.width);
  svg.setAttribute('height', ar.height);
  svg.setAttribute('viewBox', `0 0 ${ar.width} ${ar.height}`);
  const order = currentType === 'match-word' ? wordOrder : meanOrder;
  order.forEach((_, li) => {
    const lEl = document.querySelector(`.left-item[data-li="${li}"]`);
    const rEl = document.querySelector(`.right-item[data-orig="${li}"]`);
    if (!lEl || !rEl) return;
    const lr = lEl.getBoundingClientRect();
    const rr = rEl.getBoundingClientRect();
    const x1 = lr.right - ar.left;
    const y1 = lr.top   - ar.top + lr.height / 2;
    const x2 = rr.left  - ar.left;
    const y2 = rr.top   - ar.top + rr.height / 2;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', x1.toFixed(1));
    line.setAttribute('y1', y1.toFixed(1));
    line.setAttribute('x2', x2.toFixed(1));
    line.setAttribute('y2', y2.toFixed(1));
    line.setAttribute('class','ans-line');
    svg.appendChild(line);
  });
}

/* ════════════════════════════════
   書き込み式ビルド
   flipped=false → ランダムに左右どちらかが空欄
   flipped=true  → 逆転：逆側が空欄になる
════════════════════════════════ */
function buildFill() {
  const allTotal  = DATA[currentLevel].length;
  const use2col   = allTotal <= 20;
  const items     = use2col ? DATA[currentLevel] : getChunk(currentLevel, fillGroupIdx);
  const total     = items.length;
  const ng        = numGroups(currentLevel);
  const ll        = LEVEL_LABEL[currentLevel];
  const startNo   = use2col ? 1 : fillGroupIdx * CHUNK + 1;
  const endNo     = startNo + total - 1;

  // 空欄パターンは外部変数を使う（逆転時は再生成しない）
  const baseBlankRight = fillBlankRight;

  let rows = '';
  items.forEach((d, i) => {
    const blankRight = fillFlipped ? !baseBlankRight.has(i) : baseBlankRight.has(i);
    const lHtml = blankRight
      ? `<div class="fill-word">${d.w[0]}</div>`
      : `<div class="fill-blank"><span class="ans">${d.w[0]}</span></div>`;
    const rHtml = blankRight
      ? `<div class="fill-blank"><span class="ans">${d.w[1]}</span></div>`
      : `<div class="fill-word">${d.w[1]}</div>`;

    // 2列モードは左右のスペーサー不要
    const spacer = use2col ? '' : '<div></div>';
    rows += `<div class="fill-row">
      <div class="fill-num">（${startNo + i}）</div>
      ${lHtml}
      <div class="fill-arrow">⇔</div>
      ${rHtml}
      ${spacer}
    </div>`;
  });

  const flipLabel  = fillFlipped ? '（逆転）' : '';
  const gridClass  = use2col ? 'fill-grid-2col' : 'fill-grid';
  const subText    = use2col
    ? `書き込み式${flipLabel} ／ 全${allTotal}語`
    : `書き込み式${flipLabel} ／ グループ${fillGroupIdx+1}/${ng} ／ No.${startNo}〜${endNo}（全${allTotal}語中）`;
  const footerText = use2col
    ? `対義語プリント — ${ll} 書き込み式${flipLabel} ／ 全${allTotal}語`
    : `対義語プリント — ${ll} 書き込み式${flipLabel} ／ グループ${fillGroupIdx+1}/${ng}`;

  return `
    <div class="header">
      <div>
        <h1>対義語プリント<span class="badge">${ll}</span></h1>
        <div class="sub">${subText}</div>
      </div>
      <div class="header-right">
        <div class="field">なまえ <div class="uline" style="width:90px"></div></div>
        <div class="field">てん <div class="uline" style="width:28px"></div>／${total}</div>
      </div>
    </div>
    <div class="instruction">✏️ 対義語（反対の意味の言葉）を□に書きましょう。</div>
    <div class="${gridClass}">${rows}</div>
    <div class="footer">${footerText}</div>`;
}

/* ════════════════════════════════
   対義語つなぎビルド
════════════════════════════════ */
function buildMatchWord() {
  const items = getChunk(currentLevel, wordGroupIdx);
  const total = items.length;
  const ng    = numGroups(currentLevel);
  const ll    = LEVEL_LABEL[currentLevel];
  const startNo = wordGroupIdx * CHUNK + 1;
  const endNo   = startNo + total - 1;
  const allTotal = DATA[currentLevel].length;

  wordOrder = shuffle([...Array(total).keys()]);

  const leftH  = items.map((d,i) =>
    `<div class="left-item" data-li="${i}"><div class="word-box lb">${d.w[0]}</div></div>`
  ).join('');
  const rightH = wordOrder.map(orig =>
    `<div class="right-item" data-orig="${orig}"><div class="word-box rb">${items[orig].w[1]}</div></div>`
  ).join('');

  return `
    <div class="header">
      <div>
        <h1>対義語プリント<span class="badge">${ll}</span></h1>
        <div class="sub">対義語つなぎ ／ グループ${wordGroupIdx+1}/${ng} ／ No.${startNo}〜${endNo}（全${allTotal}語中）</div>
      </div>
      <div class="header-right">
        <div class="field">なまえ <div class="uline" style="width:90px"></div></div>
        <div class="field">てん <div class="uline" style="width:28px"></div>／${total}</div>
      </div>
    </div>
    <div class="instruction">✏️ 左の言葉の対義語を右から選んで線でむすびましょう。</div>
    <div class="match-area match-word" id="matchArea">
      <svg class="match-svg" id="matchSvg"></svg>
      <div class="left-col">${leftH}</div>
      <div class="right-col">${rightH}</div>
    </div>
    <div class="footer">対義語プリント — ${ll} 対義語つなぎ ／ グループ${wordGroupIdx+1}/${ng}</div>`;
}

/* ════════════════════════════════
   意味つなぎビルド
════════════════════════════════ */
function buildMatchMeaning() {
  const items = getChunk(currentLevel, meanGroupIdx);
  const total = items.length;
  const ng    = numGroups(currentLevel);
  const ll    = LEVEL_LABEL[currentLevel];
  const wi    = meanPage; // 0=左語, 1=右語
  const startNo = meanGroupIdx * CHUNK + 1;
  const endNo   = startNo + total - 1;
  const allTotal = DATA[currentLevel].length;
  const pageLabel = wi === 0 ? '1枚目（左の言葉）' : '2枚目（右の言葉）';

  meanOrder = shuffle([...Array(total).keys()]);

  const leftH  = items.map((d,i) =>
    `<div class="left-item" data-li="${i}"><div class="word-box lb">${d.w[wi]}</div></div>`
  ).join('');
  const rightH = meanOrder.map(orig =>
    `<div class="right-item" data-orig="${orig}"><div class="meaning-box">${items[orig].m[wi]}</div></div>`
  ).join('');

  return `
    <div class="header">
      <div>
        <h1>対義語プリント<span class="badge">${ll}</span></h1>
        <div class="sub">意味つなぎ ／ グループ${meanGroupIdx+1}/${ng} ／ ${pageLabel} ／ No.${startNo}〜${endNo}（全${allTotal}語中）</div>
      </div>
      <div class="header-right">
        <div class="field">なまえ <div class="uline" style="width:90px"></div></div>
        <div class="field">てん <div class="uline" style="width:28px"></div>／${total}</div>
      </div>
    </div>
    <div class="instruction">✏️ 左の言葉と意味が合うものを右から選んで線でむすびましょう。</div>
    <div class="match-area match-meaning" id="matchArea">
      <svg class="match-svg" id="matchSvg"></svg>
      <div class="left-col">${leftH}</div>
      <div class="right-col">${rightH}</div>
    </div>
    <div class="footer">対義語プリント — ${ll} 意味つなぎ ／ グループ${meanGroupIdx+1}/${ng} ${pageLabel}</div>`;
}

/* ════════════════════════════════
   ナビ更新
════════════════════════════════ */
function updateNav() {
  const ng = numGroups(currentLevel);

  // コントロール表示切替
  document.getElementById('fillControls').style.display    = currentType==='fill' ? '' : 'none';
  document.getElementById('pageControls').style.display    = '' /* 常に表示 */;
  /* meaningControls は常に非表示（◀▶で代替） */

  if (currentType === 'fill') {
    const use2col = DATA[currentLevel].length <= 20;
    const btn = document.getElementById('btnFlip');
    btn.classList.toggle('active-btn', fillFlipped);
    btn.textContent = fillFlipped ? '🔄 元に戻す（左の語を表示）' : '🔄 左右を逆にする';
    document.getElementById('btnPrev').disabled = use2col || fillGroupIdx === 0;
    document.getElementById('btnNext').disabled = use2col || fillGroupIdx === ng - 1;
    document.getElementById('pageLabel').textContent = use2col ? `全${DATA[currentLevel].length}語` : `グループ ${fillGroupIdx+1}/${ng}`;

  } else if (currentType === 'match-word') {
    document.getElementById('btnPrev').disabled = wordGroupIdx === 0;
    document.getElementById('btnNext').disabled = wordGroupIdx === ng - 1;
    document.getElementById('pageLabel').textContent = `グループ ${wordGroupIdx+1}/${ng}`;

  } else {
    document.getElementById('btnMeanPage0').classList.toggle('active-btn', meanPage===0);
    document.getElementById('btnMeanPage1').classList.toggle('active-btn', meanPage===1);
    document.getElementById('btnPrev').disabled = (meanGroupIdx===0 && meanPage===0);
    document.getElementById('btnNext').disabled = (meanGroupIdx===ng-1 && meanPage===1);
    document.getElementById('pageLabel').textContent = `グループ ${meanGroupIdx+1}/${ng}`;
  }
}

/* ════════════════════════════════
   メインレンダー
════════════════════════════════ */
function render() {
  showAns = false;
  const sheet = document.getElementById('sheet');
  sheet.classList.remove('show-ans');

  if (currentType === 'fill') {
    sheet.innerHTML = buildFill();
  } else if (currentType === 'match-word') {
    sheet.innerHTML = buildMatchWord();
    requestAnimationFrame(() => { if (showAns) drawLines(); });
  } else {
    sheet.innerHTML = buildMatchMeaning();
    requestAnimationFrame(() => { if (showAns) drawLines(); });
  }
  updateNav();
}

/* ════════════════════════════════
   イベント
════════════════════════════════ */

// 苦手モード管理
let nigateMode = false;

function setNigateMode(on) {
  nigateMode = on;
  document.getElementById('sheet').style.display       = on ? 'none' : '';
  document.getElementById('nigatePanel').style.display  = on ? '' : 'none';
  // 種類タブ・各コントロール・答えボタンを苦手モード中は隠す
  const hideIds = ['typeTabs','fillControls','pageControls','meaningControls','btnAns','btnHide'];
  hideIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = on ? 'none' : '';
  });
  // divider も非表示に（2つ目以降）
  document.querySelectorAll('.ui-panel .divider').forEach((d, i) => {
    d.style.display = on ? (i === 0 ? 'none' : 'none') : '';
  });
  if (on) buildNigatePanel();
}

function buildNigatePanel() {
  const levels = ['基本','A','B','C'];
  const labelMap = {'基本':'基本レベル','A':'Aランク','B':'Bランク','C':'Cランク'};
  let html = '';
  levels.forEach(lv => {
    html += `<div class="nigate-level-block">
      <div class="nigate-level-title">${labelMap[lv]}</div>
      <div class="nigate-grid">`;
    DATA[lv].forEach((d, i) => {
      const key = `${lv}-${i}`;
      const checked = nigateSelected.has(key) ? 'checked' : '';
      html += `<div class="nigate-item">
        <input type="checkbox" id="nc-${key}" data-key="${key}" ${checked}>
        <label for="nc-${key}">${d.w[0]}↔${d.w[1]}</label>
      </div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('nigatePanelInner').innerHTML = html;
  updateNigateCount();

  // チェックボックスのイベント
  document.querySelectorAll('#nigatePanelInner input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', () => {
      if (cb.checked) nigateSelected.add(cb.dataset.key);
      else nigateSelected.delete(cb.dataset.key);
      saveNigate();
      updateNigateCount();
    });
  });
}

function updateNigateCount() {
  const n = nigateSelected.size;
  document.getElementById('nigateCount').textContent = `${n}件選択中`;
  document.getElementById('btnNigateCreate').disabled = n === 0;
}

/* ════════════════════════════════
   苦手書き込み式ビルド
════════════════════════════════ */
let nigateBlankRight = new Set();
let nigateItems      = [];

function generateNigateFillPattern(total) {
  nigateBlankRight = new Set(
    shuffle([...Array(total).keys()]).slice(0, Math.ceil(total / 2))
  );
}

function buildNigateFill() {
  // nigateSelected から対象ペアを抽出（元のレベル・番号も保持）
  nigateItems = [];
  const lvShort = {'基本':'基','A':'A','B':'B','C':'C'};
  ['基本','A','B','C'].forEach(lv => {
    DATA[lv].forEach((d, i) => {
      if (nigateSelected.has(`${lv}-${i}`))
        nigateItems.push({ d, label: `${lvShort[lv]}${i + 1}` });
    });
  });

  const total    = nigateItems.length;
  const use2col  = true; // 苦手プリントは常に2列
  const flipLabel = fillFlipped ? '（逆転）' : '';
  const gridClass = use2col ? 'fill-grid-2col' : 'fill-grid';

  let rows = '';
  nigateItems.forEach(({ d, label }, i) => {
    const blankRight = fillFlipped ? !nigateBlankRight.has(i) : nigateBlankRight.has(i);
    const lHtml = blankRight
      ? `<div class="fill-word">${d.w[0]}</div>`
      : `<div class="fill-blank"><span class="ans">${d.w[0]}</span></div>`;
    const rHtml = blankRight
      ? `<div class="fill-blank"><span class="ans">${d.w[1]}</span></div>`
      : `<div class="fill-word">${d.w[1]}</div>`;
    const spacer = use2col ? '' : '<div></div>';
    rows += `<div class="fill-row">
      <div class="fill-num">${label}</div>
      ${lHtml}
      <div class="fill-arrow">⇔</div>
      ${rHtml}
      ${spacer}
    </div>`;
  });

  return `
    <div class="header">
      <div>
        <h1>対義語プリント<span class="badge">⭐ 苦手</span></h1>
        <div class="sub">書き込み式${flipLabel} ／ 全${total}語</div>
      </div>
      <div class="header-right">
        <div class="field">なまえ <div class="uline" style="width:90px"></div></div>
        <div class="field">てん <div class="uline" style="width:28px"></div>／${total}</div>
      </div>
    </div>
    <div class="instruction">✏️ 対義語（反対の意味の言葉）を□に書きましょう。</div>
    <div class="${gridClass}">${rows}</div>
    <div class="footer">対義語プリント — ⭐ 苦手 書き込み式${flipLabel} ／ 全${total}語</div>`;
}

// 苦手プリント表示モード
let nigateSheetMode = false;

function showNigateSheet() {
  nigateSheetMode = true;
  fillFlipped = false;
  generateNigateFillPattern(nigateSelected.size);

  // 選択パネルを隠してシートを表示
  document.getElementById('nigatePanel').style.display = 'none';
  const sheet = document.getElementById('sheet');
  sheet.style.display = '';
  sheet.classList.remove('show-ans');
  showAns = false;
  sheet.innerHTML = buildNigateFill();

  // コントロール表示
  document.getElementById('fillControls').style.display = '';
  document.getElementById('pageControls').style.display = 'none';
  document.getElementById('btnAns').style.display  = '';
  document.getElementById('btnHide').style.display = '';

  // 「選択に戻る」ボタンを表示
  document.getElementById('btnBackToNigate').style.display = '';
  // 逆転ボタンの表示更新
  const btn = document.getElementById('btnFlip');
  btn.classList.remove('active-btn');
  btn.textContent = '🔄 左右を逆にする';
}

function backToNigatePanel() {
  nigateSheetMode = false;
  fillFlipped = false;
  document.getElementById('sheet').style.display = 'none';
  document.getElementById('nigatePanel').style.display = '';
  document.getElementById('fillControls').style.display = 'none';
  document.getElementById('pageControls').style.display = 'none';
  document.getElementById('btnAns').style.display  = 'none';
  document.getElementById('btnHide').style.display = 'none';
  document.getElementById('btnBackToNigate').style.display = 'none';
}

// 苦手選択セット（localStorageから復元）
const NIGATE_KEY = 'taigigo_nigate_v1';
function loadNigate() {
  try {
    const saved = localStorage.getItem(NIGATE_KEY);
    return saved ? new Set(JSON.parse(saved)) : new Set();
  } catch { return new Set(); }
}
function saveNigate() {
  try {
    localStorage.setItem(NIGATE_KEY, JSON.stringify([...nigateSelected]));
  } catch {}
}
const nigateSelected = loadNigate();

// レベルタブ
document.getElementById('levelTabs').addEventListener('click', e => {
  const t = e.target.closest('.tab'); if (!t) return;
  document.querySelectorAll('#levelTabs .tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');

  if (t.dataset.level === '苦手') {
    setNigateMode(true);
    return;
  }

  setNigateMode(false);
  currentLevel = t.dataset.level;
  fillGroupIdx = 0; wordGroupIdx = 0; meanGroupIdx = 0; meanPage = 0;
  fillFlipped  = false;
  generateFillPattern();
  render();
});

// 種類タブ
document.getElementById('typeTabs').addEventListener('click', e => {
  const t = e.target.closest('.tab'); if (!t) return;
  document.querySelectorAll('#typeTabs .tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  currentType = t.dataset.type;
  render();
});

// 書き込み式：逆転ボタン
document.getElementById('btnFlip').addEventListener('click', () => {
  fillFlipped = !fillFlipped;
  const btn = document.getElementById('btnFlip');
  btn.classList.toggle('active-btn', fillFlipped);
  btn.textContent = fillFlipped ? '🔄 元に戻す（左の語を表示）' : '🔄 左右を逆にする';
  if (nigateSheetMode) {
    const sheet = document.getElementById('sheet');
    sheet.classList.remove('show-ans');
    showAns = false;
    sheet.innerHTML = buildNigateFill();
  } else {
    render();
  }
});

// ◀ ▶ ページ切替（種類ごとに振り分け）
document.getElementById('btnPrev').addEventListener('click', () => {
  if (currentType === 'fill') {
    if (fillGroupIdx > 0) { fillGroupIdx--; generateFillPattern(); render(); }
  } else if (currentType === 'match-word') {
    if (wordGroupIdx > 0) { wordGroupIdx--; render(); }
  } else {
    if (meanPage === 1) { meanPage = 0; render(); }
    else if (meanGroupIdx > 0) { meanGroupIdx--; meanPage = 1; render(); }
  }
});
document.getElementById('btnNext').addEventListener('click', () => {
  const ng = numGroups(currentLevel);
  if (currentType === 'fill') {
    if (fillGroupIdx < ng-1) { fillGroupIdx++; generateFillPattern(); render(); }
  } else if (currentType === 'match-word') {
    if (wordGroupIdx < ng-1) { wordGroupIdx++; render(); }
  } else {
    if (meanPage === 0) { meanPage = 1; render(); }
    else if (meanGroupIdx < ng-1) { meanGroupIdx++; meanPage = 0; render(); }
  }
});

// 意味つなぎ：1枚目/2枚目直接切替
document.getElementById('btnMeanPage0').addEventListener('click', () => { meanPage = 0; render(); });
document.getElementById('btnMeanPage1').addEventListener('click', () => { meanPage = 1; render(); });

// 答えボタン
document.getElementById('btnAns').addEventListener('click', () => {
  showAns = true;
  document.getElementById('sheet').classList.add('show-ans');
  if (currentType !== 'fill') {
    requestAnimationFrame(() => requestAnimationFrame(() => drawLines()));
  }
});
document.getElementById('btnHide').addEventListener('click', () => {
  showAns = false;
  document.getElementById('sheet').classList.remove('show-ans');
});

// 苦手：チェックをすべて外す
document.getElementById('btnNigateClear').addEventListener('click', () => {
  nigateSelected.clear();
  saveNigate();
  document.querySelectorAll('#nigatePanelInner input[type="checkbox"]').forEach(cb => cb.checked = false);
  updateNigateCount();
});

// 苦手：プリントを作る
document.getElementById('btnNigateCreate').addEventListener('click', () => {
  showNigateSheet();
});

// 苦手：選択に戻る
document.getElementById('btnBackToNigate').addEventListener('click', () => {
  backToNigatePanel();
});

window.addEventListener('resize', () => {
  if (showAns && currentType !== 'fill') drawLines();
});

generateFillPattern();
render();
</script>
</body>
</html>
