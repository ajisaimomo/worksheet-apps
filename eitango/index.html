<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中1英単語タイピング</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@700&family=Barlow:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family:'Noto Sans JP',sans-serif;
  background:#e8e2d8;
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
}

/* ── 画面管理 ── */
.screen { display:none; width:100%; flex-direction:column; align-items:center; min-height:100vh; padding:20px 16px 40px; }
.screen.active { display:flex; }

/* ════════════════════════
   タイトル画面
════════════════════════ */
.title-header {
  width:100%; max-width:520px;
  background:#fff; border-radius:18px;
  box-shadow:0 2px 14px rgba(0,0,0,.10);
  padding:22px 24px 18px;
  text-align:center; margin-bottom:18px;
}
.title-icon { font-size:44px; margin-bottom:8px; }
.title-main {
  font-family:'Noto Serif JP',serif; font-size:24px; font-weight:700;
  color:#3a2e1e; letter-spacing:.06em; margin-bottom:4px;
}
.title-main span {
  font-family:'Barlow',sans-serif; font-size:13px; font-weight:700;
  color:#aaa; letter-spacing:.1em; margin-left:8px;
}
.title-sub { font-size:12px; color:#999; letter-spacing:.08em; }

/* テストモードトグル */
.test-row {
  width:100%; max-width:520px;
  background:#fff; border-radius:14px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  padding:12px 18px;
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px;
}
.test-row-label { font-size:13px; font-weight:700; color:#555; display:flex; align-items:center; gap:8px; }
.test-badge {
  font-size:10px; padding:2px 8px; border-radius:5px;
  background:#c87941; color:#fff; font-weight:700; letter-spacing:.04em;
  opacity:0; transition:opacity .2s;
}
.test-badge.on { opacity:1; }

.tgl { position:relative; width:50px; height:28px; cursor:pointer; }
.tgl input { display:none; }
.tgl-track { width:100%; height:100%; background:#ccc; border-radius:14px; transition:background .2s; }
.tgl input:checked + .tgl-track { background:#c87941; }
.tgl-thumb {
  position:absolute; top:3px; left:3px;
  width:22px; height:22px; background:#fff; border-radius:50%;
  box-shadow:0 1px 4px rgba(0,0,0,.25); transition:left .2s;
}
.tgl input:checked ~ .tgl-thumb { left:25px; }

/* カテゴリリスト */
.cat-item { width:100%; max-width:520px; margin-bottom:10px; }
.cat-btn {
  background:#fff; border:2px solid #d9d0c0;
  border-radius:14px; padding:16px 14px;
  cursor:pointer; transition:all .18s;
  text-align:left; font-family:'Noto Sans JP',sans-serif;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
  width:100%; display:flex; align-items:center; gap:10px;
}
.cat-btn:hover { border-color:#c87941; box-shadow:0 6px 16px rgba(0,0,0,.10); }
.cat-btn.open  { border-color:#c87941; border-bottom-left-radius:0; border-bottom-right-radius:0; border-bottom:none; }
.cat-btn-left  { flex:1; text-align:left; }
.cat-arrow { font-size:12px; color:#aaa; transition:transform .2s; }
.cat-btn.open .cat-arrow { transform:rotate(180deg); }

/* グループ展開パネル */
.group-panel {
  background:#fffdf9; border:2px solid #c87941;
  border-top:none; border-bottom-left-radius:14px; border-bottom-right-radius:14px;
  padding:12px 14px 14px;
  display:none; flex-wrap:wrap; gap:8px;
}
.group-panel.open { display:flex; }
.grp-btn {
  background:#fff; border:2px solid #d9d0c0; border-radius:8px;
  padding:8px 14px; cursor:pointer; font-family:'Barlow',sans-serif;
  font-weight:700; font-size:13px; color:#7a5c2e;
  transition:all .15s; white-space:nowrap;
}
.grp-btn:hover { background:#c87941; color:#fff; border-color:#c87941; }
.grp-btn:active { transform:scale(.97); }

/* ════════════════════════
   ゲーム画面
════════════════════════ */
#screen-game { padding-top:20px; gap:14px; justify-content:flex-start; }

/* ヘッダーバー */
.game-header {
  width:100%; max-width:520px;
  background:#fff; border-radius:14px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  padding:11px 16px;
  display:flex; align-items:center; gap:10px;
}
.btn-back {
  font-family:'Noto Sans JP',sans-serif; font-size:12px; font-weight:700;
  background:#f5f0e8; border:2px solid #c0b89a; color:#666;
  border-radius:7px; padding:5px 12px; cursor:pointer; transition:all .15s;
  white-space:nowrap;
}
.btn-back:hover { background:#ede6d6; }
.game-cat-label { font-size:13px; font-weight:700; color:#7a5c2e; }
.game-mode-badge {
  font-size:10px; padding:2px 8px; border-radius:5px;
  background:#c87941; color:#fff; font-weight:700; letter-spacing:.04em;
  display:none;
}
.game-mode-badge.show { display:inline-block; }
.game-prog { margin-left:auto; font-family:'Barlow',sans-serif; font-weight:700; font-size:13px; color:#aaa; }

/* ワードカード */
.word-card {
  width:100%; max-width:520px;
  background:#fff; border-radius:20px;
  box-shadow:0 2px 14px rgba(0,0,0,.09);
  padding:28px 24px 22px;
  text-align:center;
  border:2px solid transparent;
  transition:border-color .2s, box-shadow .2s;
}
.word-card.flash-correct { border-color:#4caf50; box-shadow:0 4px 20px rgba(76,175,80,.2); }
.word-card.flash-wrong   { border-color:#e53935; box-shadow:0 4px 16px rgba(229,57,53,.15); }

/* 英語表示（通常モードのみ） */
.en-row {
  display:flex; align-items:center; justify-content:center; gap:12px;
  margin-bottom:10px; min-height:56px;
}
.en-word {
  font-family:'Barlow',sans-serif; font-weight:900;
  font-size:clamp(28px,7vw,48px); letter-spacing:.03em;
  color:#7a5c2e;
}
.btn-speak {
  background:#f5f0e8; border:2px solid #c0b89a; color:#7a5c2e;
  border-radius:50%; width:34px; height:34px; font-size:15px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all .15s; flex-shrink:0; padding:0; font-family:inherit;
}
.btn-speak:hover { background:#7a5c2e; color:#fff; border-color:#7a5c2e; }
body.test-mode .en-row { display:none; }

/* 日本語 */
.ja-word {
  font-size:clamp(18px,4.5vw,26px); font-weight:700;
  color:#444; line-height:1.5; letter-spacing:.06em;
  border-top:1px solid #f0ece4; padding-top:12px; margin-top:4px;
}
body.test-mode .ja-word {
  border-top:none; padding-top:0; margin-top:0;
  font-size:clamp(24px,6vw,36px); color:#3a2e1e;
}

/* 文字ボックス列 */
.typing-row {
  width:100%; max-width:520px;
  display:flex; justify-content:center; gap:5px; flex-wrap:wrap;
  min-height:56px; align-items:center;
}
.letter-box {
  width:40px; height:50px;
  border:2px solid #d9d0c0; border-radius:9px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Barlow',sans-serif; font-weight:700; font-size:22px;
  color:#ccc; background:#faf8f4;
  transition:all .12s;
}
.letter-box.typed { color:#3a2e1e; border-color:#a08060; background:#fff; }
.letter-box.cur   { border-color:#c87941; background:#fff9f3; box-shadow:0 0 0 3px rgba(200,121,65,.15); color:#bbb; }
.letter-box.wrong { border-color:#e53935; background:#fff5f5; animation:shake .28s ease; }
.letter-box.done  { color:#4caf50; border-color:#81c784; background:#f1fbf1; }

@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
@keyframes cardPop { 0%,100%{transform:scale(1)} 45%{transform:scale(1.025)} }
.word-card.pop { animation:cardPop .28s ease; }

/* 進捗ドット */
.prog-dots {
  width:100%; max-width:520px;
  background:#fff; border-radius:14px;
  box-shadow:0 2px 10px rgba(0,0,0,.07);
  padding:14px 18px;
  display:flex; gap:8px; justify-content:center; flex-wrap:wrap;
}
.dot { width:10px; height:10px; border-radius:50%; background:#e0d8cc; transition:all .2s; }
.dot.done { background:#c87941; }
.dot.cur  { background:#c87941; box-shadow:0 0 0 3px rgba(200,121,65,.25); transform:scale(1.45); }

/* hidden input */
.hidden-input { position:absolute; opacity:0; pointer-events:none; width:1px; height:1px; }

/* ヒントボタン（テストモードのみ表示） */
.btn-hint {
  font-family:'Noto Sans JP',sans-serif; font-size:13px; font-weight:700;
  background:#fff; border:2px solid #d9d0c0; color:#999;
  border-radius:50px; padding:8px 20px; cursor:pointer;
  transition:all .15s; display:none;
}
body.test-mode .btn-hint { display:inline-block; }
.btn-hint:hover { border-color:#c87941; color:#c87941; background:#fff9f3; }
.btn-hint:active { transform:scale(.97); }
.btn-hint.used { border-color:#e0c09a; color:#c87941; }

/* ヒントスペル表示 */
.hint-spelling {
  font-family:'Barlow',sans-serif; font-weight:900;
  font-size:clamp(22px,5vw,34px); letter-spacing:.12em;
  color:#c87941; margin-top:12px;
  border-top:1px dashed #e0c09a; padding-top:10px;
  min-height:0; overflow:hidden;
  max-height:0; opacity:0;
  transition:max-height .3s ease, opacity .3s ease, padding .3s ease;
}
.hint-spelling.visible {
  max-height:60px; opacity:1; padding-top:10px;
}

/* ヒント済み単語一覧（結果画面） */
.hint-words-wrap {
  background:#fff9f3; border:2px solid #e0c09a;
  border-radius:12px; padding:16px; margin-bottom:16px;
  text-align:left;
}
.hint-words-label {
  font-size:11px; font-weight:700; color:#c87941; letter-spacing:.1em;
  margin-bottom:10px;
}
.hint-tags { display:flex; flex-wrap:wrap; gap:7px; }
.hint-tag {
  font-family:'Barlow',sans-serif; font-weight:700; font-size:14px;
  background:#fff; border:2px solid #e0c09a; color:#7a5c2e;
  border-radius:7px; padding:4px 10px;
}
.btn-review {
  background:#e07030; color:#fff;
  box-shadow:0 3px 12px rgba(224,112,48,.3);
}
.btn-review:hover { background:#c85e20; }

/* ════════════════════════
   結果画面
════════════════════════ */
#screen-result { padding-top:20px; gap:14px; justify-content:flex-start; }

.result-card {
  width:100%; max-width:520px;
  background:#fff; border-radius:20px;
  box-shadow:0 2px 14px rgba(0,0,0,.09);
  padding:32px 24px; text-align:center;
}
.result-icon { font-size:60px; margin-bottom:10px; }
.result-msg  { font-family:'Noto Serif JP',serif; font-size:20px; font-weight:700; color:#3a2e1e; margin-bottom:24px; line-height:1.6; white-space:pre-line; }
.score-wrap { background:#f5f0e8; border-radius:12px; padding:18px; margin-bottom:24px; }
.score-label { font-size:11px; font-weight:700; color:#aaa; letter-spacing:.12em; margin-bottom:4px; }
.score-num {
  font-family:'Barlow',sans-serif; font-weight:900;
  font-size:56px; color:#7a5c2e; line-height:1;
}
.score-num span { font-size:24px; color:#bbb; }
.score-pct { font-size:13px; color:#aaa; margin-top:4px; }

.result-btns { display:flex; flex-direction:column; gap:10px; }
.btn-res {
  font-family:'Noto Sans JP',sans-serif; font-size:15px; font-weight:700;
  padding:14px 24px; border-radius:50px; cursor:pointer; border:none;
  transition:all .15s; letter-spacing:.04em;
}
.btn-res:hover { transform:translateY(-1px); }
.btn-retry { background:#7a5c2e; color:#fff; box-shadow:0 3px 12px rgba(122,92,46,.3); }
.btn-retry:hover { background:#6a4e26; }
.btn-next  { background:#c87941; color:#fff; box-shadow:0 3px 12px rgba(200,121,65,.3); }
.btn-next:hover { background:#b06930; }
.btn-test   { background:#4a7c59; color:#fff; box-shadow:0 3px 12px rgba(74,124,89,.3); }
.btn-test:hover { background:#3a6448; }
.btn-home  { background:#f5f0e8; color:#666; border:2px solid #d9d0c0; box-shadow:none; }
.miss-words-wrap { background:#fff5f5; border:2px solid #f5c0c0; border-radius:12px; padding:16px; margin-bottom:10px; text-align:left; }
.miss-words-label { font-size:11px; font-weight:700; color:#e53935; letter-spacing:.1em; margin-bottom:10px; }
.btn-home:hover { background:#ede6d6; }

/* フッター */
.app-footer { font-size:11px; color:#bbb; padding:12px 0; }

/* カテゴリリスト */
.cat-grid {
  width:100%; max-width:520px;
  display:grid; grid-template-columns:repeat(2,1fr); gap:10px;
}
.cat-btn {
  background:#fff; border:2px solid #d9d0c0;
  border-radius:14px; padding:16px 14px;
  cursor:pointer; transition:all .18s;
  text-align:left; font-family:'Noto Sans JP',sans-serif;
  box-shadow:0 2px 8px rgba(0,0,0,.06); width:100%;
}
.cat-btn:hover { border-color:#c87941; transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,.10); }
.cat-btn:active { transform:scale(.97); }
.cat-emoji { font-size:26px; margin-bottom:6px; display:block; }
.cat-name  { font-size:14px; font-weight:700; color:#3a2e1e; margin-bottom:2px; }
.cat-count { font-size:11px; color:#aaa; }

/* グループ選択画面 */
#screen-group { padding-top:20px; gap:14px; justify-content:flex-start; }
.group-header {
  width:100%; max-width:520px; background:#fff; border-radius:14px;
  box-shadow:0 2px 10px rgba(0,0,0,.08); padding:14px 18px;
  display:flex; align-items:center; gap:12px;
}
.group-header-emoji { font-size:28px; }
.group-header-name  { font-size:16px; font-weight:700; color:#3a2e1e; }
.group-header-count { font-size:12px; color:#aaa; }
.group-grid {
  width:100%; max-width:520px;
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
}
.grp-btn {
  background:#fff; border:2px solid #d9d0c0; border-radius:12px;
  padding:14px 8px; cursor:pointer; text-align:center;
  font-family:'Barlow',sans-serif; font-weight:700; font-size:14px; color:#7a5c2e;
  box-shadow:0 2px 6px rgba(0,0,0,.06); transition:all .18s;
}
.grp-btn:hover { border-color:#c87941; transform:translateY(-2px); box-shadow:0 5px 14px rgba(0,0,0,.10); background:#fffdf9; }
.grp-btn:active { transform:scale(.97); }
.grp-btn .grp-range { font-size:13px; font-weight:700; color:#7a5c2e; display:block; }
.grp-btn .grp-num   { font-size:11px; color:#aaa; margin-top:2px; display:block; font-family:'Noto Sans JP',sans-serif; font-weight:400; }

/* 紙吹雪 */
.confetti { position:fixed; pointer-events:none; z-index:999; font-size:18px; animation:fly var(--dur) ease-out forwards; }
@keyframes fly { 0%{transform:translate(0,0) rotate(0) scale(1);opacity:1} 100%{transform:translate(var(--tx),var(--ty)) rotate(var(--rot)) scale(.3);opacity:0} }

/* 花火 */
#fw-canvas { position:fixed; inset:0; pointer-events:none; z-index:100; }

/* ════ 苦手単語ボタン（タイトル画面） ════ */
.weak-btn-row { width:100%; max-width:520px; margin-bottom:14px; }
.btn-weak-mode {
  width:100%; background:#fff3e0; border:2px solid #e0a060;
  border-radius:14px; padding:14px 18px;
  display:flex; align-items:center; justify-content:space-between;
  cursor:pointer; transition:all .18s;
  box-shadow:0 2px 10px rgba(0,0,0,.07);
}
.btn-weak-mode:hover { border-color:#c87941; transform:translateY(-1px); box-shadow:0 4px 14px rgba(0,0,0,.12); }
.btn-weak-mode-left { font-size:14px; font-weight:700; color:#7a5c2e; display:flex; align-items:center; gap:8px; }
.weak-count-badge { background:#c87941; color:#fff; font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px; }
.btn-weak-list-link { font-size:11px; color:#c87941; font-weight:700; text-decoration:underline; cursor:pointer; white-space:nowrap; }

/* ════ 苦手リスト画面 ════ */
#screen-weak { padding-top:20px; gap:14px; }
.weak-list-header {
  width:100%; max-width:520px; background:#fff; border-radius:18px;
  box-shadow:0 2px 14px rgba(0,0,0,.10); padding:18px 22px;
  display:flex; align-items:center; justify-content:space-between;
}
.weak-list-title { font-family:'Noto Serif JP',serif; font-size:18px; font-weight:700; color:#3a2e1e; }
.btn-clear-all { font-size:11px; font-weight:700; background:#fff0f0; border:2px solid #e57373; color:#e53935; border-radius:7px; padding:5px 12px; cursor:pointer; transition:all .15s; }
.btn-clear-all:hover { background:#ffebee; }
.weak-list-body { width:100%; max-width:520px; display:flex; flex-direction:column; gap:8px; }
.weak-item {
  background:#fff; border-radius:12px; padding:12px 16px;
  box-shadow:0 2px 8px rgba(0,0,0,.07);
  display:flex; align-items:center; gap:10px;
}
.weak-item-en { font-family:'Barlow',sans-serif; font-weight:800; font-size:17px; color:#7a5c2e; flex-shrink:0; }
.weak-item-ja { font-size:12px; color:#888; flex:1; }
.weak-item-stats { font-size:11px; color:#bbb; white-space:nowrap; }
.weak-item-stats span { color:#c87941; font-weight:700; }
.btn-remove-item { background:#fff0f0; border:2px solid #e57373; color:#e53935; border-radius:7px; padding:4px 10px; font-size:11px; font-weight:700; cursor:pointer; white-space:nowrap; transition:all .15s; flex-shrink:0; }
.btn-remove-item:hover { background:#ffebee; }
.weak-list-empty { text-align:center; color:#bbb; font-size:14px; padding:40px; }
.weak-list-footer { width:100%; max-width:520px; display:flex; gap:10px; }
.btn-start-weak { flex:1; background:#c87941; border:none; color:#fff; border-radius:12px; padding:15px; font-family:'Noto Sans JP',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all .18s; box-shadow:0 2px 8px rgba(200,121,65,.3); }
.btn-start-weak:hover { background:#b06830; box-shadow:0 4px 14px rgba(200,121,65,.4); }
.btn-start-weak:disabled { background:#ccc; cursor:not-allowed; box-shadow:none; }

/* 正解時「苦手から外す」ボタン */
.btn-remove-weak {
  display:none; font-size:12px; font-weight:700;
  background:#fff0f0; border:2px solid #e57373; color:#e53935;
  border-radius:20px; padding:7px 18px; cursor:pointer;
  transition:all .15s;
}
.btn-remove-weak.show { display:inline-block; }
.btn-remove-weak:hover { background:#ffebee; }
.game-mode-badge.weak { background:#e53935; }

@media(max-width:400px) {
  .cat-grid { grid-template-columns:1fr; }
  .letter-box { width:33px; height:44px; font-size:18px; }
}
</style>
</head>
<body>

<!-- ════ タイトル画面 ════ -->
<div id="screen-title" class="screen active">

  <div class="title-header">
    <div class="title-icon">📖</div>
    <div class="title-main">中1英単語アプリ <span>GRADE 7 VOCABULARY</span></div>
    <div class="title-sub">タイピングで覚えよう</div>
  </div>

  <div class="test-row">
    <div class="test-row-label">
      テストモード
      <span class="test-badge" id="testBadge">テスト中</span>
    </div>
    <label class="tgl">
      <input type="checkbox" id="testToggle">
      <div class="tgl-track"></div>
      <div class="tgl-thumb"></div>
    </label>
  </div>

  <div class="weak-btn-row" id="weakBtnRow" style="display:none">
    <div class="btn-weak-mode" id="btnWeakMode">
      <span class="btn-weak-mode-left">😓 苦手単語をテストする <span class="weak-count-badge" id="weakCountBadge">0語</span></span>
      <span class="btn-weak-list-link" id="btnWeakListLink">一覧を見る →</span>
    </div>
  </div>

  <div class="cat-grid" id="catGrid"></div>
  <div class="app-footer">英単語検定（単検）中1一覧より</div>
</div>

<!-- ════ グループ選択画面 ════ -->
<div id="screen-group" class="screen">
  <div class="group-header">
    <button class="btn-back" onclick="goTo('title')">← もどる</button>
    <span class="group-header-emoji" id="groupHeaderEmoji"></span>
    <div>
      <div class="group-header-name"  id="groupHeaderName"></div>
      <div class="group-header-count" id="groupHeaderCount"></div>
    </div>
  </div>
  <div class="group-grid" id="groupGrid"></div>
</div>

<!-- ════ ゲーム画面 ════ -->
<div id="screen-game" class="screen">

  <div class="game-header">
    <button class="btn-back" id="btnQuit">← やめる</button>

/* ── 状態 ── */
let isTest=false, currentCat='', currentGroup=0, originGroup=0;

/* ── 音声 ── */
function speak(word){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(word);
  u.lang='en-US'; u.rate=0.85;
  speechSynthesis.speak(u);
}

/* ── 画面遷移 ── */
function goTo(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  if(id==='title') stopFireworks();
}

/* ════ 苦手単語 機能 ════ */
const LS_KEY='eitango_v3_weak';
let weakData={};
let isWeakMode=false;
let weakStreaks={};

function loadWeak(){
  try{ weakData=JSON.parse(localStorage.getItem(LS_KEY)||'{}'); }catch(e){ weakData={}; }
  updateWeakBadge();
}
function saveWeak(){
  localStorage.setItem(LS_KEY,JSON.stringify(weakData));
  updateWeakBadge();
}
function addToWeak(w,type){
  if(!isTest) return;
  const key=w.en;
  if(!weakData[key]) weakData[key]={ja:w.ja,miss:0,hint:0,lastSeen:todayStr()};
  if(type==='miss') weakData[key].miss=(weakData[key].miss||0)+1;
  if(type==='hint') weakData[key].hint=(weakData[key].hint||0)+1;
  weakData[key].lastSeen=todayStr();
  saveWeak();
}
function removeFromWeak(en){
  delete weakData[en];
  saveWeak();
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function updateWeakBadge(){
  const n=Object.keys(weakData).length;
  const badge=document.getElementById('weakCountBadge');
  if(badge) badge.textContent=`${n}語`;
  const row=document.getElementById('weakBtnRow');
  if(row) row.style.display=n>0?'block':'none';
}
function buildWeakList(){
  const body=document.getElementById('weakListBody');
  const keys=Object.keys(weakData);
  updateWeakBadge();
  const startBtn=document.getElementById('btnStartWeakFromList');
  if(startBtn) startBtn.disabled=keys.length===0;
  if(keys.length===0){ body.innerHTML='<div class="weak-list-empty">苦手単語はありません 🎉</div>'; return; }
  keys.sort((a,b)=>((weakData[b].miss||0)+(weakData[b].hint||0))-((weakData[a].miss||0)+(weakData[a].hint||0)));
  body.innerHTML=keys.map(en=>{
    const d=weakData[en];
    const safeEn=en.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div class="weak-item">
      <span class="weak-item-en">${en}</span>
      <span class="weak-item-ja">${d.ja}</span>
      <span class="weak-item-stats">ミス<span>${d.miss||0}</span> ヒント<span>${d.hint||0}</span></span>
      <button class="btn-remove-item" onclick="removeFromWeak('${safeEn}');buildWeakList()">外す</button>
    </div>`;
  }).join('');
}
function showWeakList(){ buildWeakList(); goTo('weak'); }
function clearAllWeak(){
  if(!confirm('苦手リストを全て削除しますか？')) return;
  weakData={}; saveWeak(); buildWeakList();
}
function startWeakMode(){
  const keys=Object.keys(weakData);
  if(keys.length===0){ alert('苦手単語がありません'); return; }
  const wlist=keys.map(en=>({en,ja:weakData[en].ja}));
  for(let i=wlist.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [wlist[i],wlist[j]]=[wlist[j],wlist[i]]; }
  words=wlist; wordIdx=0; correctCount=0; typed=''; hintWords=[]; missWords=[]; isReviewMode=false; isWeakMode=true;
  weakStreaks={};
  isTest=true;
  document.body.classList.add('test-mode');
  document.getElementById('testToggle').checked=true;
  document.getElementById('testBadge').classList.add('on');
  document.getElementById('gameCatLabel').textContent='😓 苦手モード';
  const mb=document.getElementById('gameModeBadge');
  mb.textContent='😓 苦手'; mb.classList.add('show','weak');
  goTo('game'); renderWord(); buildDots(); focusInput();
}

/* ── タイトル構築 ── */
function buildTitle(){
  const toggle=document.getElementById('testToggle');
  const badge=document.getElementById('testBadge');
  toggle.addEventListener('change',()=>{
    isTest=toggle.checked;
    document.body.classList.toggle('test-mode',isTest);
    badge.classList.toggle('on',isTest);
  });
  const grid=document.getElementById('catGrid');
  grid.innerHTML='';
  CATS.forEach(cat=>{
    const total=DATA[cat].length;
    const groups=Math.ceil(total/CHUNK);
    const parts=cat.split(' ');
    const btn=document.createElement('button');
    btn.className='cat-btn';
    btn.innerHTML=`<span class="cat-emoji">${parts[0]}</span><div class="cat-name">${parts.slice(1).join(' ')}</div><div class="cat-count">${total}語 ／ ${groups}グループ</div>`;
    btn.addEventListener('click',()=>{
      if(groups===1){ startGame(cat,0); }
      else { showGroupSelect(cat); }
    });
    grid.appendChild(btn);
  });
}

/* ── グループ選択画面 ── */
function showGroupSelect(cat){
  const parts=cat.split(' ');
  document.getElementById('groupHeaderEmoji').textContent=parts[0];
  document.getElementById('groupHeaderName').textContent=parts.slice(1).join(' ');
  const total=DATA[cat].length;
  const groups=Math.ceil(total/CHUNK);
  document.getElementById('groupHeaderCount').textContent=`${total}語 ／ ${groups}グループ`;
  const ggrid=document.getElementById('groupGrid');
  ggrid.innerHTML='';
  for(let g=0;g<groups;g++){
    const start=g*CHUNK+1;
    const end=Math.min((g+1)*CHUNK, total);
    const btn=document.createElement('button');
    btn.className='grp-btn';
    btn.innerHTML=`<span class="grp-range">${start}〜${end}</span><span class="grp-num">${g+1}グループ目</span>`;
    btn.addEventListener('click',()=>startGame(cat,g));
    ggrid.appendChild(btn);
  }
  goTo('group');
}

/* ── ゲーム開始 ── */
function startGame(cat,groupIndex){
  currentCat=cat; currentGroup=groupIndex; originGroup=groupIndex;
  words=DATA[cat].slice(groupIndex*CHUNK,(groupIndex+1)*CHUNK);
  wordIdx=0; correctCount=0; typed=''; hintWords=[]; missWords=[]; isReviewMode=false; isWeakMode=false;
  const parts=cat.split(' ');
  document.getElementById('gameCatLabel').textContent=parts.slice(1).join(' ');
  const mb=document.getElementById('gameModeBadge');
  mb.classList.toggle('show',isTest); mb.classList.remove('weak'); mb.textContent='📝 テスト';
  goTo('game');
  renderWord();
  buildDots();
  focusInput();
}

/* ── 復習モード開始 ── */
function startReview(){
  // 通常: ミスのみ / テスト: ヒント＋ミスをまとめて重複除去
  const reviewSet=[];
  const seen=new Set();
  const sources = isTest ? [...hintWords,...missWords] : [...missWords];
  sources.forEach(w=>{ if(!seen.has(w.en)){ seen.add(w.en); reviewSet.push(w); } });
  words=reviewSet;
  wordIdx=0; correctCount=0; typed=''; hintWords=[]; missWords=[]; isReviewMode=true; isWeakMode=false;
  reviewIsTest=isTest;
  document.getElementById('gameCatLabel').textContent='復習';
  const mb2=document.getElementById('gameModeBadge');
  mb2.classList.add('show'); mb2.classList.remove('weak'); mb2.textContent='📝 テスト';
  if(reviewIsTest) document.body.classList.add('test-mode');
  else document.body.classList.remove('test-mode');
  goTo('game');
  renderWord();
  buildDots();
  focusInput();
}

/* ── 単語レンダー ── */
function renderWord(){
  const w=words[wordIdx];
  document.getElementById('enWord').textContent=w.en;
  document.getElementById('jaWord').textContent=w.ja;
  document.getElementById('gameProg').textContent=`${wordIdx+1} / ${words.length}`;
  typed=''; hintCount=0;
  document.getElementById('btnRemoveWeak').classList.remove('show');
  const _hs=document.getElementById('hintSpelling');
  if(_hs){ _hs.classList.remove('visible'); _hs.textContent=''; }
  const _bh=document.getElementById('btnHint');
  if(_bh){ _bh.classList.remove('used'); _bh.textContent='💡 ヒント'; }
  buildLetterBoxes(w.en);
  updateDots();
  document.getElementById('wordCard').classList.remove('flash-correct','flash-wrong','pop');
  // 通常モードは単語表示時に自動読み上げ
  if(!isTest) speak(w.en);
}

/* ── ヒント ── */
function useHint(){
  const w=words[wordIdx];
  const spelling=document.getElementById('hintSpelling');
  const btn=document.getElementById('btnHint');
  if(spelling.classList.contains('visible')){
    // 2回目：非表示
    spelling.classList.remove('visible');
    btn.textContent='💡 ヒント';
    btn.classList.remove('used');
  } else {
    // 1回目：スペルを表示 & 記録
    spelling.textContent=w.en;
    spelling.classList.add('visible');
    btn.textContent='💡 ヒントを隠す';
    btn.classList.add('used');
    if(!hintWords.find(x=>x.en===w.en)) hintWords.push(w);
    addToWeak(w,'hint');
  }
  focusInput();
}

/* ── 文字ボックス生成 ── */
function buildLetterBoxes(word){
  const row=document.getElementById('typingRow');
  row.innerHTML='';
  const narrow=word.length>=9;
  for(let i=0;i<word.length;i++){
    const box=document.createElement('div');
    box.className='letter-box';
    if(narrow) box.style.cssText='width:32px;font-size:18px;';
    box.id=`lb-${i}`;
    row.appendChild(box);
  }
  highlightCurrent();
}

/* ── カーソル表示 ── */
function highlightCurrent(){
  const w=words[wordIdx];
  for(let i=0;i<w.en.length;i++){
    const box=document.getElementById(`lb-${i}`);
    if(!box)continue;
    box.classList.remove('typed','cur','wrong','done');
    if(i<typed.length){ box.classList.add('typed'); box.textContent=typed[i]; }
    else if(i===typed.length){ box.classList.add('cur'); box.textContent=''; }
    else{ box.textContent=''; }
  }
}

/* ── 入力処理 ── */
function handleInput(e){
  const w=words[wordIdx];
  const target=w.en.toLowerCase();
  const val=e.target.value;
  e.target.value='';
  if(!val) return;
  const newChar=val[val.length-1].toLowerCase();
  const pos=typed.length;
  if(pos>=target.length) return;

  if(newChar===target[pos]){
    typed+=w.en[pos];
    highlightCurrent();
    if(typed.length===w.en.length) onWordComplete();
  } else {
    const box=document.getElementById(`lb-${pos}`);
    if(box){ box.classList.add('wrong'); setTimeout(()=>{ box.classList.remove('wrong'); highlightCurrent(); },300); }
    { const w=words[wordIdx]; if(!missWords.find(x=>x.en===w.en)) missWords.push(w); addToWeak(w,'miss'); }
    const card=document.getElementById('wordCard');
    card.classList.add('flash-wrong');
    setTimeout(()=>card.classList.remove('flash-wrong'),300);
  }
}

/* ── 単語完成 ── */
function onWordComplete(){
  correctCount++;
  const w=words[wordIdx];
  const card=document.getElementById('wordCard');
  for(let i=0;i<w.en.length;i++){
    const box=document.getElementById(`lb-${i}`);
    if(box){ box.className='letter-box done'; box.textContent=w.en[i]; }
  }
  card.classList.add('flash-correct','pop');
  if(isTest) speak(w.en);  // テストモードのみ正解時に読み上げ
  spawnConfetti(card);

  // 苦手モード：連続正解カウント＆自動卒業
  if(isWeakMode){
    weakStreaks[w.en]=(weakStreaks[w.en]||0)+1;
    const streak=weakStreaks[w.en];
    const btn=document.getElementById('btnRemoveWeak');
    btn.dataset.wordEn=w.en;
    if(streak>=3){
      removeFromWeak(w.en);
      btn.textContent='🎓 3回連続正解！卒業しました'; btn.classList.add('show'); btn.disabled=true;
    } else {
      btn.textContent='⭐ 苦手から外す'; btn.classList.add('show'); btn.disabled=false;
    }
  }
  setTimeout(()=>{
    card.classList.remove('flash-correct','pop');
    wordIdx++;
    if(wordIdx>=words.length) showResult();
    else{ renderWord(); focusInput(); }
  },900);
}

/* ── 進捗ドット ── */
function buildDots(){
  const wrap=document.getElementById('progDots');
  wrap.innerHTML='';
  words.forEach((_,i)=>{ const d=document.createElement('div'); d.className='dot'; d.id=`dot-${i}`; wrap.appendChild(d); });
  updateDots();
}
function updateDots(){
  words.forEach((_,i)=>{
    const d=document.getElementById(`dot-${i}`);
    if(!d)return;
    d.className='dot';
    if(i<wordIdx) d.classList.add('done');
    if(i===wordIdx) d.classList.add('cur');
  });
}

/* ── フォーカス ── */
function focusInput(){ const inp=document.getElementById('hiddenInput'); inp.value=''; inp.focus(); }

/* ── 結果 ── */
function showResult(){
  const total=words.length;
  const pct=Math.round(correctCount/total*100);
  let icon,msg;
  if(pct===100){
    icon = isReviewMode ? '🌟' : '🎉';
    msg  = isReviewMode ? '完璧！ヒントなしで全部正解！' : 'パーフェクト！\nすばらしい！';
  }
  else if(pct>=80){icon='👏';msg='よくできました！\nあと少しで完璧！';}
  else if(pct>=60){icon='😊';msg='なかなか良いです！\nもう一度挑戦しよう！';}
  else{icon='💪';msg='もう一度がんばろう！';}
  document.getElementById('resIcon').textContent=icon;
  document.getElementById('resMsg').textContent=msg;
  document.getElementById('resScore').innerHTML=`${correctCount}<span>/${total}</span>`;
  document.getElementById('resPct').textContent=`正解率 ${pct}%`;

  // ヒント単語（テストモードのみ）
  const hWrap=document.getElementById('hintWordsWrap');
  const hTags=document.getElementById('hintTags');
  if(isTest && hintWords.length>0){
    hTags.innerHTML=hintWords.map(w=>`<span class="hint-tag">${w.en}</span>`).join('');
    hWrap.style.display='block';
  } else { hWrap.style.display='none'; }

  // ミス単語（両モード）
  const mWrap=document.getElementById('missWordsWrap');
  const mTags=document.getElementById('missTags');
  if(missWords.length>0){
    mTags.innerHTML=missWords.map(w=>`<span class="hint-tag">${w.en}</span>`).join('');
    mWrap.style.display='block';
  } else { mWrap.style.display='none'; }

  // 復習ボタン：通常→ミスあり / テスト→ヒントorミスあり
  const btnRev=document.getElementById('btnReview');
  const hasReview=isTest ? (hintWords.length>0||missWords.length>0) : missWords.length>0;
  btnRev.style.display=hasReview?'block':'none';
  const both=hintWords.length>0 && missWords.length>0;
  if(isTest){
    btnRev.textContent=both?'🔁 ヒント＆ミス単語をテストする':hintWords.length>0?'🔁 ヒント単語をテストする':'🔁 ミス単語をテストする';
  } else {
    btnRev.textContent='🔁 ミス単語を練習する';
  }

  // テストボタン：練習モードのみ
  document.getElementById('btnTestMode').style.display=(!isTest)?'block':'none';

  // 次のグループへ：復習後はoriginGroupの次、通常はcurrentGroupの次
  const nextIdx=isReviewMode ? originGroup+1 : currentGroup+1;
  const hasNext=nextIdx*CHUNK<DATA[currentCat].length;
  document.getElementById('btnNextGroup').style.display=hasNext?'block':'none';

  // 復習後モードを元に戻す
  if(isReviewMode) document.body.classList.toggle('test-mode', isTest);

  goTo('result');
  if(pct===100) startFireworks();
}

/* ── ボタン ── */
document.getElementById('btnQuit').addEventListener('click',()=>{ isWeakMode=false; goTo('title'); });
document.getElementById('btnHint').addEventListener('click',()=>{ useHint(); });
document.getElementById('btnReview').addEventListener('click',startReview);
document.getElementById('btnTestMode').addEventListener('click',()=>{
  isTest=true;
  document.body.classList.add('test-mode');
  document.getElementById('testToggle').checked=true;
  document.getElementById('testBadge').classList.add('on');
  startGame(currentCat, originGroup);
});
document.getElementById('btnRetry').addEventListener('click',()=>{ isReviewMode?startReview():isWeakMode?startWeakMode():startGame(currentCat,currentGroup); });
document.getElementById('btnNextGroup').addEventListener('click',()=>{ const next=isReviewMode?originGroup+1:currentGroup+1; isWeakMode=false; startGame(currentCat,next); });
document.getElementById('btnSpeak').addEventListener('click',()=>{ if(words[wordIdx]) speak(words[wordIdx].en); });
document.getElementById('hiddenInput').addEventListener('input',handleInput);
document.getElementById('screen-game').addEventListener('click',focusInput);
document.getElementById('btnWeakMode').addEventListener('click',startWeakMode);
document.getElementById('btnWeakListLink').addEventListener('click',e=>{ e.stopPropagation(); showWeakList(); });
document.getElementById('btnClearAll').addEventListener('click',clearAllWeak);
document.getElementById('btnStartWeakFromList').addEventListener('click',startWeakMode);
document.getElementById('btnRemoveWeak').addEventListener('click',()=>{
  const btn=document.getElementById('btnRemoveWeak');
  const en=btn.dataset.wordEn;
  if(en){ removeFromWeak(en); weakStreaks[en]=0; }
  btn.textContent='✅ 外しました'; btn.disabled=true;
});
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  if(!document.getElementById('screen-result').classList.contains('active'))return;
  e.preventDefault();
  const n=document.getElementById('btnNextGroup');
  if(n.style.display!=='none') n.click();
  else document.getElementById('btnRetry').click();
});

/* ── 紙吹雪 ── */
const CC=['⭐','🌟','✨','💫','🎉','🎊','⚡','🌸'];
const CR=['#c87941','#ffd60a','#4caf50','#e53935','#9c27b0','#1976d2','#ff8c00'];
function spawnConfetti(el){
  const r=el.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  for(let i=0;i<12;i++){
    const e=document.createElement('div'); e.className='confetti';
    const angle=(Math.PI*2/12)*i+(Math.random()-.5)*.8;
    const dist=60+Math.random()*100;
    e.style.cssText=`left:${cx}px;top:${cy}px;--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist-50}px;--rot:${(Math.random()-.5)*720}deg;--dur:${.4+Math.random()*.35}s;color:${CR[i%CR.length]}`;
    e.textContent=CC[i%CC.length];
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),850);
  }
}

/* ── 花火 ── */
let fwCanvas,fwCtx,fwParticles=[],fwRaf=null;
function startFireworks(){
  fwCanvas=document.getElementById('fw-canvas');
  fwCanvas.width=window.innerWidth; fwCanvas.height=window.innerHeight;
  fwCtx=fwCanvas.getContext('2d'); fwParticles=[];
  let n=0;
  const launch=()=>{ if(n++>=14)return; launchFW(); setTimeout(launch,300+Math.random()*400); };
  launch();
  if(fwRaf) cancelAnimationFrame(fwRaf);
  fwRaf=requestAnimationFrame(fwLoop);
  setTimeout(stopFireworks,5500);
}
function launchFW(){
  const x=window.innerWidth*(.2+Math.random()*.6), y=window.innerHeight*(.1+Math.random()*.45);
  const hue=Math.random()*360, n=60+Math.floor(Math.random()*30);
  for(let i=0;i<n;i++){
    const a=Math.PI*2/n*i, s=2+Math.random()*4;
    fwParticles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,alpha:1,color:`hsl(${hue+Math.random()*40},100%,55%)`,size:1.5+Math.random()*2});
  }
}
function fwLoop(){
  if(!fwCtx)return;
  fwCtx.clearRect(0,0,fwCanvas.width,fwCanvas.height);
  fwParticles=fwParticles.filter(p=>p.alpha>.02);
  fwParticles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.vx*=.97;p.alpha-=.018;
    fwCtx.globalAlpha=p.alpha;fwCtx.fillStyle=p.color;
    fwCtx.beginPath();fwCtx.arc(p.x,p.y,p.size,0,Math.PI*2);fwCtx.fill();
  });
  fwCtx.globalAlpha=1;
  fwRaf=requestAnimationFrame(fwLoop);
}
function stopFireworks(){
  setTimeout(()=>{ if(fwCtx)fwCtx.clearRect(0,0,fwCanvas.width,fwCanvas.height); fwParticles=[]; },2000);
}

buildTitle();
loadWeak();
